<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yassmina's Birthday Invitation</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            transition: all 0.5s ease;
        }

        /* Question Screen */
        #question-screen h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 30px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 80px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        #yes-btn {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        #yes-btn:hover {
            transform: scale(1.05);
        }

        #no-btn {
            background-color: #e74c3c;
            color: white;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        /* Invitation Screen (Hidden initially) */
        #invitation-screen {
            display: none;
            animation: fadeIn 0.8s ease forwards;
        }

        #invitation-screen h1 {
            color: #800020; /* Burgundy */
            font-size: 2.3rem;
            margin-bottom: 15px;
        }

        .date-location {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* Danger Alert Box */
        .danger-alert {
            background-color: #fff3cd;
            border-left: 5px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .danger-alert h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 1.1rem;
            color: #ba8b00;
        }

        .danger-alert p {
            font-size: 1rem;
            margin-bottom: 5px;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Screen 1: Question -->
        <div id="question-screen">
            <h1>Are you ready?</h1>
            <div class="btn-container">
                <button id="yes-btn" class="btn" onclick="showInvitation()">Yes</button>
                <button id="no-btn" class="btn" onclick="shrinkNoButton()">No</button>
            </div>
        </div>

        <!-- Screen 2: Invitation -->
        <div id="invitation-screen">
            <h1>Welcome to Yassmina's Birthday!</h1>
            <div class="date-location">
                <p><strong>Date:</strong> September 13, 2026</p>
                <p><strong>Location:</strong> Ain Diab Beach 🏖️</p>
            </div>
            
            <!-- Danger Notice -->
            <div class="danger-alert">
                <h3>⚠️ DANGER / ATTENTION</h3>
                <p>• Must wear: BURGUNDY color! 🍷</p>
                <p>• Don't forget the gift! 🎁</p>
            </div>
        </div>
    </div>

    <script>
        let noScale = 1;
        let noOpacity = 1;

        function shrinkNoButton() {
            const noBtn = document.getElementById('no-btn');
            
            // Decrease scale and opacity
            noScale -= 0.2;
            noOpacity -= 0.2;

            if (noScale <= 0.1) {
                noBtn.style.display = 'none'; // Disappear completely
            } else {
                noBtn.style.transform = `scale(${noScale})`;
                noBtn.style.opacity = noOpacity;
            }
        }

        function showInvitation() {
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('invitation-screen').style.display = 'block';
        }
    </script>
</body>
</html>
